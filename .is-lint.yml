ls:
  .dir: snake_case | regex:[0-9]+_[a-z_]+
  .*: snake_case
  .md: snake_case | regex:[0-9A-Z\-]+
  .txt: snake_case | kebab-case
  .yml: snake_case | kebab-case
  .py: snake_case
  .ipynb: snake_case
  .sps: snake_case
  .xlsx: snake_case
  .docx: snake_case

ignore:
  - .git
  - .github
  - .vscode
  - venv
  - .ruff_cache
  - .ipynb_checkpoints
  - __pycache__
  - .ls-lint.yml
  - .markdownlint.yml
